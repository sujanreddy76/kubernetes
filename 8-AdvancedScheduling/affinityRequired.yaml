apiVersion: apps/v1
kind: Deployment
metadata:
  name: required-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - image: nginx
          name: nginx  
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                 - matchExpressions:
                    - key: disktype
                      operator: In
                      values:
                        - ssd
                        - thin

                        