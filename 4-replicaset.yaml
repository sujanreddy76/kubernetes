#matchLabels example
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-rs
  labels: 
    app: app-rs
spec:
  replicas: 3
  selector:
    matchLabels:
      env: dev
  template:
    metadata:
      labels:
        env: dev
        tier: frontend
    spec:
      containers:
        - name: my-ctr
          image: nginx   

---
#matchLabels and matchExpressions example
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: frontend-matchexpressions
spec:
  selector:
    matchLabels:
      env: dev
    matchExpressions:
      - {key: tier, operator: In, values: [frontend,rs]}  
      - {key: dc, operator: NotIn, values: [mum, hyd]}
  replicas: 3
  template:
    metadata:
      labels:
        env: dev
        tier: frontend
    spec:
      containers:
        - name: my-ctr
          image: nginx  
                     