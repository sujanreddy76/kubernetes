# ReplicaSet
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-rs
spec:
  replicas: 3
  selector:
    matchLabels:
      env: dev
  # The below is the details about the pod
  template:
    metadata:
      labels:
        env: dev
        tier: frontend
    spec:
      containers:
        - name: nginximage
          image: nginx    

---
# kubectl run hydpod --image nginx --labels="env=dev,tier=frontend,dc=hyd"      F1 F2 
# kubectl run mumpod --image nginx --labels="env=dev,tier=frontend,dc=mum"      F1 F2
