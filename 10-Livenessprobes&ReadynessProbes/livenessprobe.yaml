#livenessProbe with exec
apiVersion: v1
kind: Pod
metadata:
  name: liveness-pod
spec:
  containers:
    - name: busybox
      image: busybox
      command: 
        - "sh"
        - "-c"
        - "echo Liveness probe && sleep 3600"
      livenessProbe:
        exec:
          command: ["echo", "helloworld"]
        initialDelaySeconds: 5  
        periodSeconds: 5   

---
apiVersion: v1
kind: Pod
metadata:
  labels:
    test: liveness
  name: liveness-exec
spec:
  containers:
  - name: liveness
    image: registry.k8s.io/busybox:1.27.2
    args:
    - /bin/sh
    - -c
    - touch /tmp/healthy; sleep 30; rm -f /tmp/healthy; sleep 600
    livenessProbe:
      exec:
        command:
        - cat
        - /tmp/healthy
      initialDelaySeconds: 5
      periodSeconds: 5

---
#livenessProbe with httpGet
apiVersion: v1
kind: Pod
metadata: 
  name: liveness-pod-nginx
spec:
  containers:
    - image: nginx
      name: nginx
      livenessProbe:
        httpGet:
          path: / #this will be provided by devs
          port: 80  

