apiVersion: v1
kind: Pod
metadata:
  name: security-pod
spec:
  containers:
  - name: busybox
    image: busybox
    command: ['sh', '-c', 'echo hello && sleep 3600']  
    securityContext:
      runAsUser: 1000
      runAsGroup: 3000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true