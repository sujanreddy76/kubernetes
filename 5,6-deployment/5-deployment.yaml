apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      env: dev
  template:
    metadata:
      labels:
        env: dev
    spec:
      containers:
        - name: my-ctr #name of the container: Mandatory
          image: devopswithcloudhub/nginx:blue          