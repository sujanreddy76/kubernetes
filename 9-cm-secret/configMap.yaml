apiVersion: v1
kind: ConfigMap
metadata: 
  name: my-config
data:
  name: siva
  course: k8s
  key3: |
    hello
    welcome to ConfigMap
    multiline testing  

# kubectl create cm literalcm --from-file=key1=value1 --from-file=key2=value2
# kubectl create cm app-configcm --from-file=app-config.properties (used for tls certificates, property files for application)

---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-env-pod
spec:
  containers:
    - image: busybox
      name: busybox
      command: ['sh', '-c', 'echo ConfigMap is: $CONFIGMAPVAR  && sleep 3600']
      env:
        - name: CONFIGMAPVAR
          valueFrom:
            configMapKeyRef:
              name: my-config
              key: name  

---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-demo-pod
spec:
  containers: 
    - image: alpine
      name: demo-alpine
      command: ["sleep", "3600"]
      envFrom:
        - configMapRef:
            name: my-config   

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-file-pod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: configmap-file
  template:
    metadata:
      labels:
        app: configmap-file
    spec:
      containers:
        - name: my-app-cont
          image: nginx
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
      volumes:
        - name: config-volume
          configMap:
            name: app-configcm   

---
apiVersion: v1
kind: Pod
metadata:
  name: config-secret-pod
spec:
  containers:
    - image: busybox
      name: busybox
      command: ['sh', '-c', 'while true; do echo CM is $CONFIGMAPVAR and Secret is $SECRETVAR; sleep 10; done']
      env:
        - name: CONFIGMAPVAR
          valueFrom:
            configMapKeyRef:
              name: my-config
              key: name
        - name: SECRETVAR
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: secret1      


